<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Comprovante — PP-OCRv6 no Browser</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1a2332; --surface2: #243044;
    --ink: #f1f5f9; --body: #94a3b8; --muted: #64748b;
    --line: #2d3a4e; --accent: #06b6d4; --green: #10b981; --amber: #f59e0b; --red: #ef4444;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--body); min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .container { max-width: 800px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
  }
  .card h2 { font-size: 1rem; color: var(--ink); margin-bottom: 0.75rem; }

  .upload-area {
    border: 2px dashed var(--line); border-radius: var(--radius);
    padding: 2rem 1rem; text-align: center; cursor: pointer;
    transition: all .2s; position: relative;
  }
  .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: rgba(6,182,212,0.05); }
  .upload-area .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .upload-area p { font-size: 0.9rem; color: var(--muted); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .preview-area { display: none; margin-top: 1rem; text-align: center; }
  .preview-area img { max-width: 100%; max-height: 300px; border-radius: 8px; }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1.2rem; border: none; border-radius: 8px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: all .2s; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem; border-radius: 8px; margin-top: 1rem;
    font-size: 0.85rem; display: none;
  }
  .status-bar.loading { display: flex; background: rgba(6,182,212,0.1); color: var(--accent); }
  .status-bar.done { display: flex; background: rgba(16,185,129,0.1); color: var(--green); }
  .status-bar.error { display: flex; background: rgba(239,68,68,0.1); color: var(--red); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-grid { display: none; }
  .result-grid.show { display: block; }

  .field {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0; border-bottom: 1px solid var(--line);
  }
  .field:last-child { border-bottom: none; }
  .field .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .field .value { font-size: 0.88rem; color: var(--ink); font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

  .text-lines { margin-top: 0.75rem; max-height: 400px; overflow-y: auto; }
  .text-line {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.25rem 0; font-size: 0.8rem; font-family: monospace;
  }
  .text-line .conf-bar {
    width: 50px; height: 5px; border-radius: 3px; background: var(--line); flex-shrink: 0; overflow: hidden;
  }
  .text-line .conf-bar .fill { height: 100%; border-radius: 3px; }
  .text-line .conf-bar .fill.high { background: var(--green); }
  .text-line .conf-bar .fill.mid { background: var(--amber); }
  .text-line .conf-bar .fill.low { background: var(--red); }

  .model-status {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
    margin-bottom: 0.75rem;
  }
  .model-status.loading { background: rgba(6,182,212,0.1); color: var(--accent); }
  .model-status.ready { background: rgba(16,185,129,0.1); color: var(--green); }
  .model-status.error { background: rgba(239,68,68,0.1); color: var(--red); }

  /* ===== BARRA DE PROGRESSO ===== */
  .progress-container {
    margin: 0.75rem 0;
    display: none;
  }
  .progress-container.show { display: block; }
  .progress-bar-bg {
    width: 100%; height: 8px;
    background: var(--line); border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width .3s ease;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem;
  }
  .progress-step {
    font-size: 0.78rem; color: var(--body); margin-top: 0.4rem;
    padding: 0.3rem 0.5rem; border-radius: 4px;
    background: rgba(6,182,212,0.05);
  }

  @media (max-width: 640px) {
    body { padding: 1rem 0.75rem; }
    header h1 { font-size: 1.2rem; }
    .card { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>📄 OCR Comprovante</h1>
  <p>Tesseract.js — OCR 100% no navegador</p>
</header>

<div class="card">
  <div class="model-status" id="modelStatus">
  </div>
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label">
      <span id="progressPct">0%</span>
      <span id="progressSize">0 / 30.5 MB</span>
    </div>
    <div class="progress-step" id="progressStep">Aguardando...</div>
  </div>

  <h2>📷 Imagem</h2>
  <div class="upload-area" id="uploadArea">
    <input type="file" accept="image/*" id="fileInput">
    <div class="icon">🖼️</div>
    <p>Clique ou arraste uma imagem de comprovante</p>
  </div>
  <div class="preview-area" id="previewArea">
    <img id="preview">
  </div>
  <div style="margin-top:1rem;text-align:center;">
    <button class="btn btn-primary" id="btnProcess" disabled>🔍 Extrair texto</button>
  </div>
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Processando...</span>
  </div>
</div>

<div class="card result-grid" id="resultCard">
  <h2>🔎 Dados Extraídos</h2>
  <div id="fieldsContainer"></div>
  <h2 style="margin-top:1.25rem;">📝 Texto Completo</h2>
  <div class="text-lines" id="textLines"></div>
</div>

</div>

<script src="app.js?v=2"></script>
</body>
</html>
