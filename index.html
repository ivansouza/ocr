<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCR Comprovante — PP-OCRv6</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1a2332; --surface2: #243044;
    --ink: #f1f5f9; --body: #94a3b8; --muted: #64748b;
    --line: #2d3a4e; --accent: #06b6d4; --accent2: #8b5cf6;
    --green: #10b981; --amber: #f59e0b; --red: #ef4444;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--body); min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 800px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; color: var(--ink); }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
  }
  .card h2 { font-size: 1rem; color: var(--ink); margin-bottom: 0.75rem; }

  .upload-area {
    border: 2px dashed var(--line); border-radius: var(--radius);
    padding: 2.5rem 1rem; text-align: center; cursor: pointer;
    transition: all .2s; position: relative;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: var(--accent); background: rgba(6,182,212,0.05);
  }
  .upload-area .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .upload-area p { font-size: 0.9rem; color: var(--muted); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .preview-area { display: none; margin-top: 1rem; }
  .preview-area img { max-width: 100%; max-height: 300px; border-radius: 8px; display: block; margin: 0 auto; }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1.2rem; border: none; border-radius: 8px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: all .2s; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem; border-radius: 8px; margin-top: 1rem;
    font-size: 0.85rem; display: none;
  }
  .status-bar.loading { display: flex; background: rgba(6,182,212,0.1); color: var(--accent); }
  .status-bar.done { display: flex; background: rgba(16,185,129,0.1); color: var(--green); }
  .status-bar.error { display: flex; background: rgba(239,68,68,0.1); color: var(--red); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-grid { display: none; }
  .result-grid.show { display: block; }

  .field {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 0; border-bottom: 1px solid var(--line);
  }
  .field:last-child { border-bottom: none; }
  .field .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .field .value { font-size: 0.9rem; color: var(--ink); font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

  .text-lines { margin-top: 1rem; }
  .text-line {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.3rem 0; font-size: 0.82rem; font-family: monospace;
  }
  .text-line .conf {
    width: 60px; height: 6px; border-radius: 3px; background: var(--line); flex-shrink: 0;
    overflow: hidden;
  }
  .text-line .conf .bar { height: 100%; border-radius: 3px; transition: width .3s; }
  .text-line .conf .bar.high { background: var(--green); }
  .text-line .conf .bar.mid { background: var(--amber); }
  .text-line .conf .bar.low { background: var(--red); }

  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }

  @media (max-width: 640px) {
    body { padding: 1rem 0.75rem; }
    header h1 { font-size: 1.3rem; }
    .card { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>📄 OCR Comprovante</h1>
  <p>PP-OCRv6 — Reconhecimento de texto em comprovantes</p>
</header>

<div class="card">
  <h2>📷 Imagem</h2>
  <div class="upload-area" id="uploadArea">
    <input type="file" accept="image/*" id="fileInput">
    <div class="icon">🖼️</div>
    <p>Clique ou arraste uma imagem de comprovante</p>
  </div>
  <div class="preview-area" id="previewArea">
    <img id="preview">
  </div>
  <div style="margin-top:1rem;text-align:center;">
    <button class="btn btn-primary" id="btnProcess" disabled>
      🔍 Extrair texto
    </button>
  </div>
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Processando...</span>
  </div>
</div>

<div class="card result-grid" id="resultCard">
  <h2>🔎 Dados Extraídos</h2>
  <div id="fieldsContainer"></div>

  <h2 style="margin-top:1.5rem;">📝 Texto Completo</h2>
  <div class="text-lines" id="textLines"></div>

  <div class="actions">
    <button class="btn btn-primary" id="btnCopy">📋 Copiar texto</button>
  </div>
</div>

</div>

<script>
  let currentFile = null;

  const fileInput = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const previewArea = document.getElementById('previewArea');
  const preview = document.getElementById('preview');
  const btnProcess = document.getElementById('btnProcess');
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const resultCard = document.getElementById('resultCard');
  const fieldsContainer = document.getElementById('fieldsContainer');
  const textLines = document.getElementById('textLines');
  const btnCopy = document.getElementById('btnCopy');

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    currentFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      previewArea.style.display = 'block';
      btnProcess.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      fileInput.files = e.dataTransfer.files;
      fileInput.dispatchEvent(new Event('change'));
    }
  });

  btnProcess.addEventListener('click', processImage);

  async function processImage() {
    if (!currentFile) return;

    statusBar.className = 'status-bar loading';
    statusText.textContent = 'Enviando imagem para processamento...';
    btnProcess.disabled = true;

    const formData = new FormData();
    formData.append('image', currentFile);

    try {
      const res = await fetch('/ocr', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('Erro no servidor: ' + res.status);
      const data = await res.json();

      statusBar.className = 'status-bar done';
      statusText.textContent = `✅ ${data.linhas} linhas extraídas | Confiança: ${data.confianca}`;
      showResults(data);
    } catch (err) {
      statusBar.className = 'status-bar error';
      statusText.textContent = '❌ ' + err.message;
    } finally {
      btnProcess.disabled = false;
    }
  }

  function showResults(data) {
    resultCard.classList.add('show');

    // Campos
    let html = '';
    const campos = data.campos || {};
    for (const [key, val] of Object.entries(campos)) {
      html += `<div class="field"><span class="label">${key}</span><span class="value">${val}</span></div>`;
    }
    fieldsContainer.innerHTML = html || '<p style="color:var(--muted)">Nenhum campo estruturado identificado.</p>';

    // Linhas de texto
    let linesHtml = '';
    (data.linhas_detalhes || []).forEach(l => {
      const pct = Math.round(l.confianca * 100);
      const cls = pct >= 90 ? 'high' : pct >= 70 ? 'mid' : 'low';
      linesHtml += `<div class="text-line">
        <span>${l.texto}</span>
        <div class="conf"><div class="bar ${cls}" style="width:${pct}%"></div></div>
        <span style="font-size:0.7rem;color:var(--muted);width:30px;text-align:right">${pct}%</span>
      </div>`;
    });
    textLines.innerHTML = linesHtml;
  }

  btnCopy.addEventListener('click', () => {
    const texto = Array.from(textLines.querySelectorAll('.text-line span:first-child'))
      .map(s => s.textContent).join('\n');
    navigator.clipboard.writeText(texto).then(() => {
      btnCopy.textContent = '✅ Copiado!';
      setTimeout(() => { btnCopy.textContent = '📋 Copiar texto'; }, 2000);
    });
  });
</script>

</body>
</html>
